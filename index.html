<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Libras Flash Cards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topo">
    <h1>🤟 Libras</h1>

    <div class="linha">
      <label class="botao-upload">
        📁 CSV local
        <input type="file" id="csvLocal" accept=".csv" hidden>
      </label>

      <label for="filtroCategoria">Categoria:</label>
      <select id="filtroCategoria"></select>

      <label for="modoJogo">Modo:</label>
      <select id="modoJogo">
        <option value="ambos">↔ Ambos</option>
        <option value="pt_sinal">PT → Sinal</option>
        <option value="sinal_pt">Sinal → PT</option>
      </select>

      <label for="tamanhoBloco">Bloco:</label>
      <select id="tamanhoBloco">
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="50">50</option>
        <option value="100" selected>100</option>
      </select>

      <button id="btnNovoBloco" type="button">🧩 Novo</button>
      <button id="btnEmbaralhar" type="button">🔀</button>
      <button id="btnTema" type="button">🌙</button>
    </div>

    <div class="stats">
      <div class="linha">
        <strong>Sessão:</strong>
        ✅ <span id="acertos">0</span>
        ❌ <span id="erros">0</span>
        📊 <span id="respondidos">0</span>/<span id="totalBloco">0</span>
      </div>
      <div class="linha">
        <strong>Total histórico:</strong>
        ✅ <span id="totalAcertosGlobal">0</span>
        ❌ <span id="totalErrosGlobal">0</span>
        | 📈 <span id="totalGlobal">0</span>
      </div>
    </div>
  </header>

  <main>
    <div class="categoria" id="categoriaAtual">Carregando...</div>
    <div class="modo-badge" id="modoBadge"></div>

    <div id="card" class="card" title="Clique para virar (ou aperte Espaço)">
      <div id="conteudo" class="conteudo">Carregando...</div>
      <div id="mediaArea" class="media-area"></div>
    </div>

    <div class="acoes">
      <button id="btnVirar" type="button">👁 Mostrar resposta</button>
    </div>

    <div class="acoes">
      <button id="btnAcerto" type="button" class="ok">✅ Acertei</button>
      <button id="btnErro"   type="button" class="no">❌ Errei</button>
    </div>

    <p class="dica">Atalhos: <b>Espaço</b>=virar &nbsp; <b>A</b>=acerto &nbsp; <b>E</b>=erro</p>
    <p class="dica">@christian.c3d</p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
